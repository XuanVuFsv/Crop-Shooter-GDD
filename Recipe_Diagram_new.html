<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Diagram — Crop Shooter Survival</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Palette Nông Trại Vui Nhộn & Sinh Tồn */
  --bg: #1a231a;       /* Xanh rêu đậm */
  --bg2: #253325;      /* Màu đất trồng */
  --bg3: #324632;      /* Màu cỏ tối */
  --bd: #4e6535;       /* Viền bụi cỏ */
  --bd2: #6b8c4a;
  --g: #a7ff3b;        /* Xanh lá mầm (Neon) */
  --y: #ffdb3b;        /* Vàng nắng */
  --r: #ff5f5f;        /* Đỏ cà chua */
  --b: #4dbfff;        /* Xanh nước biển */
  --p: #d38cff;        /* Tím khoai môn */
  --w: #f0f4e8;        /* Trắng kem */
  --mu: #8c9e7a;       /* Xanh lá úa */
  --fh: 'Fredoka', sans-serif;
  --fm: 'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--w);
  font-family: var(--fh);
  font-size: 13px;
  background-image: 
    radial-gradient(var(--bg2) 2px, transparent 2px),
    linear-gradient(rgba(167, 255, 59, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167, 255, 59, 0.02) 1px, transparent 1px);
  background-size: 30px 30px, 60px 60px, 60px 60px;
}

.wrap { position: relative; z-index: 1; padding: 30px 20px 100px; max-width: 1400px; margin: 0 auto; }

/* HEADER - BẢNG HIỆU GỖ */
.hd {
  display: flex; flex-direction: column; gap: 5px; margin-bottom: 25px;
  background: var(--bg2); padding: 20px; border-radius: 18px;
  border: 4px solid var(--bd); box-shadow: 6px 6px 0px rgba(0,0,0,0.4);
}
.hd h1 { 
  font-size: 32px; font-weight: 700; color: var(--g); 
  text-shadow: 3px 3px 0 var(--bg); -webkit-text-stroke: 1px var(--bg);
}
.hd p { color: var(--mu); font-family: var(--fm); font-size: 11px; text-transform: uppercase; }

/* TABS - STICKERS */
.tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
.tab {
  padding: 10px 20px; font-size: 12px; font-weight: 700; border-radius: 15px;
  background: var(--bg3); color: var(--mu); cursor: pointer; 
  border: 3px solid var(--bd); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  white-space: nowrap; text-transform: uppercase;
}
.tab:hover { color: var(--w); transform: translateY(-2px); }
.tab.active { 
  background: var(--g); color: var(--bg); border-color: var(--w); 
  transform: translateY(-5px) rotate(-1deg); box-shadow: 0 5px 15px rgba(167, 255, 59, 0.3);
}

/* LEGEND */
.leg { 
  display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; 
  padding: 12px 18px; border-radius: 12px; border: 3px solid var(--bd); background: rgba(0,0,0,0.2);
}
.li { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: var(--w); }
.ld { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }

/* DIAGRAM AREA */
.scroll-x { overflow-x: auto; padding-bottom: 20px; }
.diagram { position: relative; display: inline-flex; flex-direction: column; min-width: 1100px; padding-right: 50px; }
svg.lines { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }

.day-strip {
  display: flex; align-items: center; gap: 12px; padding: 8px 15px;
  background: rgba(0,0,0,0.3); border-radius: 12px; margin: 20px 0 10px;
  position: sticky; left: 0; z-index: 5; border: 1px solid var(--bd);
}
.day-num {
  font-weight: 800; font-size: 13px; color: #000; padding: 4px 12px; border-radius: 8px;
  transform: rotate(-2deg); box-shadow: 3px 3px 0 rgba(0,0,0,0.3); white-space: nowrap;
}
.d1{background:var(--g)} .d3{background:#9dff7f} .d5{background:var(--y)} .d8{background:#ff9f3f} 
.d10{background:var(--r); color:#fff} .d12{background:var(--b)} .d15{background:var(--p); color:#fff} .d20{background:#777; color:#fff}

.cols-row { display: flex; gap: 15px; padding: 10px 0; }
.col { display: flex; flex-direction: column; gap: 10px; width: 190px; flex-shrink: 0; z-index: 2; }
.col-lbl { 
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; 
  color: var(--mu); padding-bottom: 5px; border-bottom: 2px dashed var(--bd); margin-bottom: 5px;
}

/* NODE STYLE */
.node {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--bg2); border: 3px solid var(--bd) !important;
  border-radius: 15px; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer; position: relative; min-height: 45px;
}
.node:hover { transform: scale(1.05) rotate(1deg); z-index: 10; filter: brightness(1.2); }
.node.active { border-color: var(--y) !important; box-shadow: 0 0 20px rgba(255, 219, 59, 0.4); transform: scale(1.05); }
.node.dimmed { opacity: 0.15; filter: grayscale(0.8); }

.node .ic { font-size: 22px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
.node .nm { font-weight: 700; font-size: 13px; color: var(--w); line-height: 1.2; }
.node .sub { font-size: 10px; color: var(--mu); font-family: var(--fm); margin-top: 2px; }

/* Node Types Left Borders */
.node.crop { border-left: 6px solid var(--g) !important; animation: bounce 4s infinite ease-in-out; }
.node.natural, .node.coop { border-left: 6px solid var(--b) !important; }
.node.inter { border-left: 6px solid var(--p) !important; }
.node.food { border-left: 6px solid var(--r) !important; }
.node.bottle { border-left: 6px solid var(--b) !important; border-right: 6px solid var(--b) !important; }
.node.special { border-left: 6px solid var(--y) !important; border-right: 6px solid var(--y) !important; }

/* BADGES */
.mbadge, .trigger-badge {
  display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 20px;
  font-weight: 800; text-transform: uppercase; margin-top: 4px;
}
.mb-regen { background: var(--b); color: #000; }
.mb-stealth { background: var(--p); color: #000; }
.trigger-badge { background: rgba(255, 219, 59, 0.2); color: var(--y); border: 1px solid var(--y); }

/* PANEL */
.panel {
  position: fixed; right: 20px; top: 20px; bottom: 20px; width: 340px;
  background: var(--bg2); border: 5px solid var(--bd); border-radius: 25px;
  z-index: 1000; display: none; flex-direction: column; overflow: hidden;
  box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
}
.panel-hd { 
  padding: 20px; background: var(--bd); display: flex; justify-content: space-between; align-items: center; 
  border-bottom: 3px solid rgba(0,0,0,0.1);
}
.ph { font-weight: 800; font-size: 14px; color: var(--y); text-transform: uppercase; }
.panel-hd button { background: var(--r); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: 800; border: 2px solid rgba(0,0,0,0.2); }

.panel-body { padding: 25px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px; }
.pn { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: var(--w); }
.prow { border-bottom: 1px dashed var(--bg3); padding-bottom: 10px; }
.pl { font-size: 10px; font-weight: 700; color: var(--mu); text-transform: uppercase; margin-bottom: 5px; }
.pv { font-size: 13px; line-height: 1.5; color: var(--w); }
.pheal { font-size: 20px; font-weight: 800; color: var(--g); text-shadow: 2px 2px 0 #000; }

/* TABLES */
.usage-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
.usage-table th { text-align: left; padding: 15px; color: var(--g); font-size: 11px; text-transform: uppercase; }
.usage-table td { padding: 15px; background: var(--bg2); border: 2px solid var(--bd); }
.usage-table tr td:first-child { border-radius: 15px 0 0 15px; }
.usage-table tr td:last-child { border-radius: 0 15px 15px 0; }

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 10px; }
</style>
</head>

  {day:10,cls:'d10', crops:['carambola','chili'], naturals:['coal'], inters:['cream'], foods:['tomato_soup'], bottles:[]},
  {day:11,cls:'d10', crops:[], naturals:['honey'], inters:[], foods:[], bottles:['crit_bottle']},
  {day:13,cls:'d12', crops:[], naturals:[], inters:[], foods:['burnwich','red_alert','carambola_cake'], bottles:['blaze_bottle','venom_bottle']},
  {day:15,cls:'d15', crops:['apple','pepper'], naturals:['ruby'], inters:['vial2','poison_shard','acid_shard'], foods:[], bottles:['cluster_bottle']},
  {day:16,cls:'d15', crops:[], naturals:[], inters:[], foods:['apple_pie','fresh_salad','honey_cake'], bottles:['corrosion_bottle'], specials:['appleclear']},
];

const EDGES=[]; const ES=new Set();
Object.entries(ITEMS).forEach(([id,item])=>{
  if(item.recipe) item.recipe.forEach(r=>{
    const src = Array.isArray(r)?r[0]:r;
    const k=src+'→'+id; if(!ES.has(k)){ES.add(k); EDGES.push({from:src,to:id});}
  });
});

// --- RENDER LOGIC ---

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
  if(id==='diagram') setTimeout(drawLines, 100);
}

const container = document.getElementById('dayBlocks');
DAY_BLOCKS.forEach(b => {
  const blk = document.createElement('div'); blk.className = 'day-block';
  blk.innerHTML = `<div class="day-strip"><div class="day-num ${b.cls}">Day ${b.day}</div></div>`;
  const row = document.createElement('div'); row.className = 'cols-row';
  
  const columns = [
    {lbl:'Crops', ids:b.crops},
    {lbl:'Natural/Coop', ids:b.naturals},
    {lbl:'Ingredients', ids:b.inters},
    {lbl:'Food', ids:b.foods},
    {lbl:'Bottles/Specials', ids:[...(b.bottles||[]), ...(b.specials||[])]}
  ];

  columns.forEach(c => {
    const col = document.createElement('div'); col.className = 'col';
    if(c.ids && c.ids.length > 0) {
      col.innerHTML = `<div class="col-lbl">${c.lbl}</div>`;
      c.ids.forEach(id => {
        const item = ITEMS[id]; if(!item) return;
        const n = document.createElement('div');
        n.className = `node ${item.type}`; n.id = 'n-'+id; n.dataset.id = id;
        n.innerHTML = `<span class="ic">${item.ic}</span><div><div class="nm">${item.nm}</div><div class="sub">Day ${item.day}</div></div>`;
        n.onclick = () => handleNodeClick(id, n);
        col.appendChild(n);
      });
    }
    row.appendChild(col);
  });
  blk.appendChild(row); container.appendChild(blk);
});

// SVG DRAWING
const svg = document.getElementById('svgLines');
function drawLines(hiId = null) {
  svg.innerHTML = '';
  const diag = document.getElementById('diagram');
  svg.setAttribute('width', diag.scrollWidth);
  svg.setAttribute('height', diag.scrollHeight);

  EDGES.forEach(edge => {
    const p1 = document.getElementById('n-'+edge.from);
    const p2 = document.getElementById('n-'+edge.to);
    if(!p1 || !p2) return;

    const d = diag.getBoundingClientRect();
    const r1 = p1.getBoundingClientRect();
    const r2 = p2.getBoundingClientRect();

    const x1 = r1.right - d.left; const y1 = r1.top - d.top + r1.height/2;
    const x2 = r2.left - d.left; const y2 = r2.top - d.top + r2.height/2;

    const isHi = hiId && (edge.from === hiId || edge.to === hiId);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const cp = (x2 - x1) * 0.5;
    path.setAttribute('d', `M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`);
    path.setAttribute('stroke', isHi ? 'var(--g)' : 'var(--bd)');
    path.setAttribute('stroke-width', isHi ? '4' : '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', hiId ? (isHi ? '1' : '0.1') : '0.4');
    svg.appendChild(path);
  });
}

function handleNodeClick(id, el) {
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  openPanel(id);
  drawLines(id);
}

function openPanel(id) {
  const item = ITEMS[id]; if(!item) return;
  const panel = document.getElementById('panel');
  panel.style.display = 'flex';
  document.getElementById('p-title').textContent = item.nm;

  let html = `<div class="pn"><span>${item.ic}</span> ${item.nm}</div>`;
  html += `<div class="prow"><div class="pl">Type</div><div class="pv">${item.type.toUpperCase()}</div></div>`;
  
  if(item.hp) html += `<div class="prow"><div class="pl">Healing</div><div class="pheal">${'❤️'.repeat(Math.ceil(item.hp/10))} +${item.hp} HP</div></div>`;
  if(item.effect) html += `<div class="prow"><div class="pl">Effect</div><div class="pv" style="color:var(--b)">${item.effect}</div></div>`;
  if(item.recipe) {
    html += `<div class="prow"><div class="pl">Recipe</div><div class="pv">`;
    item.recipe.forEach(r => {
      const ing = ITEMS[Array.isArray(r)?r[0]:r];
      const qty = Array.isArray(r)?r[1]:1;
      html += `<div>${ing.ic} ${ing.nm} <span style="color:var(--y)">x${qty}</span></div>`;
    });
    html += `</div></div>`;
  }
  if(item.trigger) html += `<div class="prow"><div class="pl">Unlock</div><div class="trigger-badge">${item.trigger}</div></div>`;
  
  document.getElementById('p-body').innerHTML = html;
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  drawLines();
}

Object.entries(ITEMS).filter(([,v])=>v.type==='bottle').forEach(([id, item])=>{
  const tr = document.createElement('tr');

  tr.innerHTML = `<td>${item.ic}</td><td><b>${item.nm}</b></td><td>Day ${item.day}</td><td>${recipe}</td><td style="color:var(--b)">${item.effect}</td><td>${item.dur}</td><td>${item.guns}</td>`;
  bBody.appendChild(tr);
});

// SPECIALS TABLE RENDER
const sBody = document.getElementById('specialRows');
Object.entries(ITEMS).filter(([,v])=>v.type==='special').forEach(([id, item])=>{
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${item.ic}</td><td style="color:var(--y)"><b>${item.nm}</b></td><td>Recipe in Diagram</td><td>${item.effect}</td><td>Day ${item.day}</td>`;
  sBody.appendChild(tr);
});

window.onload = () => setTimeout(drawLines, 200);
window.onresize = () => drawLines();
</script>
